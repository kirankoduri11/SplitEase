<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
  <head>
    <meta charset="UTF-8" />
    <title th:text="${group.name}">Group</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link th:href="@{/css/style.css}" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/groups}">
          <i class="bi bi-wallet2 me-2"></i>SplitEase
        </a>
        <div class="d-flex align-items-center gap-3">
          <span class="text-white"
            ><i class="bi bi-person-circle me-1"></i
            ><span th:text="${userEmail}"></span
          ></span>
          <form th:action="@{/logout}" method="post" class="d-inline">
            <input
              type="hidden"
              th:name="${_csrf.parameterName}"
              th:value="${_csrf.token}"
            />
            <button type="submit" class="btn btn-outline-light btn-sm">
              Logout
            </button>
          </form>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      <a th:href="@{/groups}" class="btn btn-outline-secondary btn-sm mb-3">
        <i class="bi bi-arrow-left me-1"></i>Back to Groups
      </a>
      <h3 class="fw-bold" th:text="${group.name}"></h3>
      <p class="text-muted" th:text="${group.description}"></p>

      <div
        th:if="${errorMsg}"
        class="alert alert-danger"
        th:text="${errorMsg}"
      ></div>

      <div class="row mt-3">
        <div class="col-md-7">
          <h5><i class="bi bi-receipt me-2"></i>Expenses</h5>
          <div th:if="${expenses.empty}" class="alert alert-info mb-3">
            No expenses yet.
          </div>
          <ul class="list-group mb-4">
            <li
              th:each="expense : ${expenses}"
              class="list-group-item d-flex justify-content-between align-items-center"
            >
              <div>
                <div class="fw-bold" th:text="${expense.description}"></div>
                <small class="text-muted"
                  >Paid by <span th:text="${expense.paidBy.name}"></span> •
                  <span
                    th:text="${#temporals.format(expense.createdAt, 'dd MMM')}"
                  ></span
                ></small>
              </div>
              <span class="badge bg-success fs-6"
                >₹<span th:text="${expense.amount}"></span
              ></span>
            </li>
          </ul>

          <h5><i class="bi bi-bar-chart me-2"></i>Balances</h5>
          <ul class="list-group mb-4">
            <li
              th:each="entry : ${balances}"
              class="list-group-item d-flex justify-content-between align-items-center"
            >
              <span class="fw-bold" th:text="${entry.key}"></span>
              <span th:if="${entry.value >= 0}" class="badge bg-success fs-6">
                ₹<span th:text="${entry.value}"></span> gets back
              </span>
              <span th:if="${entry.value < 0}" class="badge bg-danger fs-6">
                ₹<span
                  th:text="${#numbers.formatDecimal(-entry.value, 1, 2)}"
                ></span>
                owes
              </span>
            </li>
          </ul>

          <h5><i class="bi bi-check-circle me-2"></i>Settlements</h5>
          <div th:if="${settlements.empty}" class="alert alert-info mb-3">
            No settlements yet.
          </div>
          <ul class="list-group mb-4">
            <li
              th:each="s : ${settlements}"
              class="list-group-item d-flex justify-content-between align-items-center"
            >
              <div>
                <span th:text="${s.paidBy.name}"></span>
                <i class="bi bi-arrow-right mx-2"></i>
                <span th:text="${s.paidTo.name}"></span>
              </div>
              <span class="badge bg-primary fs-6"
                >₹<span th:text="${s.amount}"></span
              ></span>
            </li>
          </ul>

          <h5><i class="bi bi-people me-2"></i>Members</h5>
          <ul class="list-group mb-4">
            <li
              th:each="member : ${group.members}"
              class="list-group-item"
              th:text="${member.user.name + ' (' + member.user.email + ')'}"
            ></li>
          </ul>
        </div>

        <div class="col-md-5">
          <div class="card mb-3">
            <div class="card-body">
              <h5 class="card-title">
                <i class="bi bi-plus-circle me-2"></i>Add Expense
              </h5>
              <form th:action="@{/expenses/add}" method="post">
                <input type="hidden" name="groupId" th:value="${group.id}" />
                <div class="mb-3">
                  <label class="form-label">Description</label>
                  <input
                    type="text"
                    name="description"
                    class="form-control"
                    required
                    placeholder="e.g. Hotel"
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label">Amount (₹)</label>
                  <input
                    type="number"
                    name="amount"
                    class="form-control"
                    required
                    placeholder="500"
                    step="0.01"
                  />
                </div>
                <input
                  type="hidden"
                  th:name="${_csrf.parameterName}"
                  th:value="${_csrf.token}"
                />
                <button type="submit" class="btn btn-success w-100">
                  Add Expense
                </button>
              </form>
            </div>
          </div>

          <div class="card mb-3">
            <div class="card-body">
              <h5 class="card-title">
                <i class="bi bi-cash me-2"></i>Record Settlement
              </h5>
              <form th:action="@{/settlements/add}" method="post">
                <input type="hidden" name="groupId" th:value="${group.id}" />
                <div class="mb-3">
                  <label class="form-label">Paid To (email)</label>
                  <input
                    type="email"
                    name="paidToEmail"
                    class="form-control"
                    required
                    placeholder="friend@email.com"
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label">Amount (₹)</label>
                  <input
                    type="number"
                    name="amount"
                    class="form-control"
                    required
                    placeholder="500"
                    step="0.01"
                  />
                </div>
                <input
                  type="hidden"
                  th:name="${_csrf.parameterName}"
                  th:value="${_csrf.token}"
                />
                <button type="submit" class="btn btn-primary w-100">
                  Record Settlement
                </button>
              </form>
            </div>
          </div>

          <div class="card">
            <div class="card-body">
              <h5 class="card-title">
                <i class="bi bi-person-plus me-2"></i>Add Member
              </h5>
              <form
                th:action="@{/groups/{id}/add-member(id=${group.id})}"
                method="post"
              >
                <div class="mb-3">
                  <label class="form-label">Member Email</label>
                  <input
                    type="email"
                    name="email"
                    class="form-control"
                    required
                    placeholder="friend@email.com"
                  />
                </div>
                <input
                  type="hidden"
                  th:name="${_csrf.parameterName}"
                  th:value="${_csrf.token}"
                />
                <button type="submit" class="btn btn-outline-primary w-100">
                  Add Member
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
