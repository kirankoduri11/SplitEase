<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Groups – SplitEase</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link th:href="@{/css/style.css}" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/groups}">SplitEase</a>
        <div class="d-flex align-items-center gap-3">
          <span class="text-white" th:text="${userEmail}"></span>
          <form th:action="@{/logout}" method="post" class="d-inline">
            <input
              type="hidden"
              th:name="${_csrf.parameterName}"
              th:value="${_csrf.token}"
            />
            <button type="submit" class="btn btn-outline-light btn-sm">
              Logout
            </button>
          </form>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      <div class="row">
        <div class="col-md-8">
          <h4 class="mb-3">My Groups</h4>
          <div th:if="${groups.empty}" class="alert alert-info">
            You have no groups yet. Create one!
          </div>
          <div class="list-group mb-4">
            <a
              th:each="group : ${groups}"
              th:href="@{/groups/{id}(id=${group.id})}"
              class="list-group-item list-group-item-action"
            >
              <div class="fw-bold" th:text="${group.name}"></div>
              <small class="text-muted" th:text="${group.description}"></small>
            </a>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Create New Group</h5>
              <form th:action="@{/groups/create}" method="post">
                <div class="mb-3">
                  <label class="form-label">Group Name</label>
                  <input
                    type="text"
                    name="name"
                    class="form-control"
                    required
                    placeholder="e.g. Goa Trip"
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label">Description</label>
                  <input
                    type="text"
                    name="description"
                    class="form-control"
                    placeholder="Optional"
                  />
                </div>
                <input
                  type="hidden"
                  th:name="${_csrf.parameterName}"
                  th:value="${_csrf.token}"
                />
                <button type="submit" class="btn btn-primary w-100">
                  Create Group
                </button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
