<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Profile – SplitEase</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link th:href="@{/css/style.css}" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/groups}">
          <i class="bi bi-wallet2 me-2"></i>SplitEase
        </a>
        <div class="d-flex align-items-center gap-3">
          <a th:href="@{/profile}" class="text-white text-decoration-none">
            <img
              th:if="${user.profilePicture != null}"
              th:src="${user.profilePicture}"
              class="rounded-circle me-1"
              width="28"
              height="28"
              style="object-fit: cover"
            />
            <i
              th:if="${user.profilePicture == null}"
              class="bi bi-person-circle me-1"
            ></i>
            <span th:text="${userEmail}"></span>
          </a>
          <form th:action="@{/logout}" method="post" class="d-inline">
            <input
              type="hidden"
              th:name="${_csrf.parameterName}"
              th:value="${_csrf.token}"
            />
            <button type="submit" class="btn btn-outline-light btn-sm">
              Logout
            </button>
          </form>
        </div>
      </div>
    </nav>

    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card shadow-sm">
            <div class="card-body text-center p-5">
              <div class="mb-4">
                <img
                  th:if="${user.profilePicture != null}"
                  th:src="${user.profilePicture}"
                  class="rounded-circle"
                  width="120"
                  height="120"
                  style="object-fit: cover; border: 4px solid #4361ee"
                />
                <div
                  th:if="${user.profilePicture == null}"
                  class="rounded-circle d-inline-flex align-items-center justify-content-center"
                  style="
                    width: 120px;
                    height: 120px;
                    background: #4361ee;
                    border: 4px solid #ccc;
                  "
                >
                  <i
                    class="bi bi-person-fill text-white"
                    style="font-size: 3rem"
                  ></i>
                </div>
              </div>
              <h4 class="fw-bold" th:text="${user.name}"></h4>
              <p class="text-muted" th:text="${user.email}"></p>

              <hr />

              <h5 class="mb-3">Upload Profile Picture</h5>
              <form
                th:action="@{/profile/upload}"
                method="post"
                enctype="multipart/form-data"
              >
                <div class="mb-3">
                  <input
                    type="file"
                    name="file"
                    class="form-control"
                    accept="image/*"
                    required
                  />
                </div>
                <input
                  type="hidden"
                  th:name="${_csrf.parameterName}"
                  th:value="${_csrf.token}"
                />
                <button type="submit" class="btn btn-primary w-100">
                  <i class="bi bi-upload me-2"></i>Upload Picture
                </button>
              </form>

              <div class="mt-4">
                <a th:href="@{/groups}" class="btn btn-outline-secondary">
                  <i class="bi bi-arrow-left me-1"></i>Back to Groups
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
